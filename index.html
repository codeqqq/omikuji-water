<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貴船神社 水占みくじ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif JP', serif;
            background: linear-gradient(180deg, #87CEEB 0%, #5F9EA0 50%, #4682B4 100%);
            min-height: 100vh;
            color: #1a3a4a;
            overflow-x: hidden;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header { text-align: center; padding: 30px 0 20px; }
        .temple-name { font-size: 2rem; font-weight: 700; color: #1a3a4a; margin-bottom: 10px; }
        .subtitle { font-size: 1rem; color: #2c5a6e; }
        
        /* 水签纸 */
        .mikuji-paper {
            width: 100%;
            max-width: 700px;
            background: linear-gradient(135deg, #fffef9 0%, #f5f0e8 100%);
            border: 3px double #5a7a8a;
            border-radius: 15px;
            padding: 25px;
            margin: 30px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .mikuji-header {
            text-align: center;
            border-bottom: 2px solid #5a7a8a;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .mikuji-title { font-size: 2.5rem; font-weight: 700; color: #1a3a4a; }
        .fortune-badge {
            display: inline-block;
            width: 80px;
            height: 80px;
            border: 3px solid #1a3a4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin: 10px auto;
        }
        .fortune-badge.大吉 { color: #c41e3a; border-color: #c41e3a; }
        .fortune-badge.吉 { color: #228b22; border-color: #228b22; }
        .fortune-badge.中吉 { color: #4169e1; border-color: #4169e1; }
        .fortune-badge.小吉 { color: #9370db; border-color: #9370db; }
        .fortune-badge.末吉 { color: #da70d6; border-color: #da70d6; }
        .fortune-badge.凶 { color: #696969; border-color: #696969; }
        
        .fortune-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .fortune-item {
            border: 1px solid #5a7a8a;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .fortune-label { font-size: 0.85rem; color: #5a7a8a; margin-bottom: 5px; font-weight: 600; }
        .fortune-value { font-size: 0.9rem; color: #1a3a4a; line-height: 1.4; }
        .poem-section {
            background: rgba(90, 122, 138, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
        }
        .poem-text { font-size: 1.1rem; line-height: 1.8; color: #1a3a4a; font-style: italic; }
        
        .btn {
            padding: 15px 50px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            margin: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #5a8a9e, #3a6a7e);
            color: #fff;
        }
        .btn-secondary {
            background: transparent;
            color: #2c5a6e;
            border: 2px solid #5a8a9e;
        }
        .controls { display: flex; gap: 15px; margin: 20px 0; }
        .hint { text-align: center; color: #2c5a6e; margin: 20px 0; }
        
        @media (max-width: 768px) {
            .fortune-grid { grid-template-columns: repeat(2, 1fr); }
            .mikuji-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="temple-name">貴布禰総本宮 貴船神社</h1>
            <p class="subtitle">水占みくじ</p>
        </header>

        <div class="mikuji-paper" id="mikujiPaper">
            <div class="mikuji-header">
                <div class="mikuji-title">水占みくじ</div>
                <div id="fortuneBadge" class="fortune-badge">大吉</div>
                <div id="stickNumber" style="font-size: 0.9rem; color: #5a7a8a;">第 7 番</div>
            </div>

            <div id="fortuneContent" style="opacity: 0; transition: opacity 2s ease;">
                <div class="poem-section">
                    <div class="poem-text" id="poemText"></div>
                </div>

                <div class="fortune-grid" id="fortuneGrid"></div>
            </div>
        </div>

        <p class="hint" id="hint">
            心を静かにして、お祈りしたいことをお思いください<br>
            「占い」ボタンを押して、神籤を水に浮かべてください
        </p>

        <div class="controls">
            <button class="btn btn-primary" id="divineBtn" onclick="divine()">占い</button>
            <button class="btn btn-secondary" onclick="reset()">リセット</button>
        </div>
    </div>

    <script>
        const mikujiData = [
            { num: 1, type: '大吉', poem: '万事望のまゝなり\n思はず早くとのう\n安心せよ', details: {
                '願望': '会实现', '恋愛': '安心吧', '出産': '容易', '病気': '专心治疗', '方向': '南方好',
                '旅行': '好', '学問': '安心学习', '商売': '无损失', '失物': '出现', '転居': '急的话好'
            }},
            { num: 2, type: '大吉', poem: '雲散じ月明らかなり\n風静かにして浪平らかなり\n前路に障りなし', details: {
                '願望': '会实现', '恋愛': '好', '出産': '平安', '病気': '痊愈', '方向': '好',
                '旅行': '好', '学問': '合格', '商売': '兴隆', '失物': '出现', '転居': '好'
            }},
            { num: 3, type: '吉', poem: '春風万物を吹いて\n大地春に帰る時\n努力すれば必ず報いあり', details: {
                '願望': '会实现', '恋愛': '好', '出産': '平安', '病気': '良好', '方向': '好',
                '旅行': '好', '学問': '合格', '商売': '好', '失物': '出现', '転居': '好'
            }},
            { num: 4, type: '吉', poem: '山重なり水復たるも\n柳暗く花明らかなる村あり\n堅持すれば必ず好転す', details: {
                '願望': '会实现', '恋愛': '晚来', '出産': '平安', '病気': '良好', '方向': '好',
                '旅行': '好', '学問': '合格', '商売': '好', '失物': '出现', '転居': '好'
            }},
            { num: 5, type: '吉', poem: '風吹いて雲散じ\n月出て山河を照らす\n前路漸く明らかなり', details: {
                '願望': '会实现', '恋愛': '会来', '出産': '平安', '病気': '良好', '方向': '好',
                '旅行': '好', '学問': '合格', '商売': '好', '失物': '出现', '転居': '好'
            }},
            { num: 6, type: '中吉', poem: '雲月を遮りて明らかならず\n風花を吹きて開かず\n時を待てば必ず好結果あり', details: {
                '願望': '会实现', '恋愛': '会来', '出産': '平安', '病気': '良好', '方向': '好',
                '旅行': '好', '学問': '合格', '商売': '普通', '失物': '出现', '転居': '好'
            }},
            { num: 7, type: '大吉', poem: '万事望のまゝなり\n思はず早くとのう\n安心せよ', details: {
                '願望': '会实现', '恋愛': '安心せよ', '出産': 'やすし', '病気': '治療に専念せよ', '方向': '南の方 よろし',
                '旅行': '行先利徳あり', '学問': '安心して勉強せよ', '商売': '売物買物損はなし', '失物': '出づる 人手に渡らず', '転居': '急がぬが 吉'
            }},
            { num: 8, type: '中吉', poem: '山高く路遠し\n水深く舟行るべし\n努力して前進せば必ず目的を達す', details: {
                '願望': '会实现', '恋愛': '会来', '出産': '平安', '病気': '良好', '方向': '好',
                '旅行': '好', '学問': '合格', '商売': '普通', '失物': '难出现', '転居': '好'
            }},
            { num: 9, type: '小吉', poem: '小雨大地を潤し\n微風面を撫ず\n平々凡々として安し', details: {
                '願望': '会实现', '恋愛': '会来', '出産': '平安', '病気': '良好', '方向': '普通',
                '旅行': '普通', '学問': '合格', '商売': '普通', '失物': '出现', '転居': '普通'
            }},
            { num: 10, type: '小吉', poem: '日出でて東方紅く\n月落ちて西山暗し\n自然に従いて安し', details: {
                '願望': '会实现', '恋愛': '会来', '出産': '平安', '病気': '良好', '方向': '普通',
                '旅行': '普通', '学問': '合格', '商売': '普通', '失物': '出现', '転居': '普通'
            }},
            { num: 11, type: '末吉', poem: '冬去りて春来たらんとし\n寒尽きて暖自ら開く\n時を待てば必ず好運来る', details: {
                '願望': '会实现', '恋愛': '等待', '出産': '注意', '病気': '注意', '方向': '普通',
                '旅行': '普通', '学問': '努力', '商売': '谨慎', '失物': '晚出现', '転居': '等待'
            }},
            { num: 12, type: '末吉', poem: '烏雲日月を遮り\n風雨前程を阻む\n堅持して天晴るを待て', details: {
                '願望': '会实现', '恋愛': '等待', '出産': '注意', '病気': '注意', '方向': '注意',
                '旅行': '注意', '学問': '努力', '商売': '谨慎', '失物': '难出现', '転居': '等待'
            }},
            { num: 13, type: '凶', poem: '烏雲日月を遮り\n風雨前程を阻む\n慎みて時を待て', details: {
                '願望': '难实现', '恋愛': '不好', '出産': '注意', '病気': '不好', '方向': '不好',
                '旅行': '不好', '学問': '不好', '商売': '不好', '失物': '难出现', '転居': '不好'
            }},
            { num: 14, type: '凶', poem: '山高く路険しく\n水深く波多し\n慎みて時を待て', details: {
                '願望': '难实现', '恋愛': '不好', '出産': '注意', '病気': '不好', '方向': '不好',
                '旅行': '不好', '学問': '不好', '商売': '不好', '失物': '难出现', '転居': '不好'
            }}
        ];

        let isDivining = false;
        let hasDivined = false;

        function divine() {
            if (isDivining || hasDivined) return;
            isDivining = true;
            
            const btn = document.getElementById('divineBtn');
            const hint = document.getElementById('hint');
            const content = document.getElementById('fortuneContent');
            
            btn.disabled = true;
            hint.innerHTML = '神籤を水に浮かべています...<br>文字が浮かび上がるのをお待ちください';
            
            setTimeout(() => {
                const selected = mikujiData[Math.floor(Math.random() * mikujiData.length)];
                
                document.getElementById('stickNumber').textContent = `第${selected.num}番`;
                document.getElementById('fortuneBadge').textContent = selected.type;
                document.getElementById('fortuneBadge').className = `fortune-badge ${selected.type}`;
                document.getElementById('poemText').textContent = selected.poem;
                
                const gridHtml = Object.entries(selected.details).map(([key, value]) => `
                    <div class="fortune-item">
                        <div class="fortune-label">${key}</div>
                        <div class="fortune-value">${value}</div>
                    </div>
                `).join('');
                document.getElementById('fortuneGrid').innerHTML = gridHtml;
                
                content.style.opacity = 1;
                hint.innerHTML = '文字が浮かび上がりました';
                
                btn.textContent = 'もう一度';
                btn.disabled = false;
                btn.onclick = reset;
                
                isDivining = false;
                hasDivined = true;
            }, 2000);
        }

        function reset() {
            hasDivined = false;
            isDivining = false;
            
            document.getElementById('fortuneContent').style.opacity = 0;
            document.getElementById('hint').innerHTML = '心を静かにして、お祈りしたいことをお思いください<br>「占い」ボタンを押して、神籤を水に浮かべてください';
            
            const btn = document.getElementById('divineBtn');
            btn.textContent = '占い';
            btn.onclick = divine;
        }
    </script>
</body>
</html>
