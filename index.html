<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贵船神社 水占卜</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'Noto Serif JP', serif;
            background: linear-gradient(180deg, #87CEEB 0%, #5F9EA0 50%, #4682B4 100%);
            min-height: 100vh;
            color: #1a3a4a;
            overflow-x: hidden;
            position: relative;
        }

        /* 水面效果 */
        .water-surface {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(180deg, rgba(95, 158, 160, 0.3) 0%, rgba(70, 130, 180, 0.6) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* 涟漪容器 */
        .ripple-container {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            pointer-events: none;
            z-index: 2;
        }

        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            opacity: 0;
        }

        .ripple.animate {
            animation: rippleEffect 2s ease-out infinite;
        }

        @keyframes rippleEffect {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
            }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 3;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 标题区域 */
        header {
            text-align: center;
            padding: 40px 0 20px;
        }

        .temple-name {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a3a4a;
            margin-bottom: 10px;
            letter-spacing: 0.2em;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #2c5a6e;
            letter-spacing: 0.15em;
        }

        /* 水签纸 */
        .mizu-paper {
            width: 100%;
            max-width: 500px;
            height: 300px;
            background: linear-gradient(135deg, #fffef9 0%, #f5f0e8 100%);
            border: 2px solid #8b7355;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            margin: 30px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.5s ease;
            overflow: hidden;
        }

        .mizu-paper.blank::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(245,240,232,0.95) 100%);
            z-index: 10;
            transition: opacity 2s ease;
        }

        .mizu-paper.revealed::before {
            opacity: 0;
            pointer-events: none;
        }

        .mizu-paper.floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-10px) rotate(1deg);
            }
        }

        .paper-content {
            text-align: center;
            padding: 30px;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .mizu-paper.revealed .paper-content {
            opacity: 1;
        }

        .fortune-type {
            font-size: 2.5rem;
            font-weight: 700;
            color: #8b0000;
            margin-bottom: 20px;
        }

        .fortune-type.大吉 { color: #c41e3a; }
        .fortune-type.吉 { color: #228b22; }
        .fortune-type.中吉 { color: #4169e1; }
        .fortune-type.小吉 { color: #9370db; }
        .fortune-type.末吉 { color: #da70d6; }
        .fortune-type.凶 { color: #696969; }

        .poem {
            font-size: 1.1rem;
            line-height: 2;
            color: #1a3a4a;
            margin: 20px 0;
            font-style: italic;
        }

        .details {
            margin-top: 20px;
            text-align: left;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #8b7355;
        }

        .detail-label {
            font-weight: 600;
            color: #8b7355;
        }

        .detail-value {
            color: #1a3a4a;
        }

        /* 按钮 */
        .btn {
            padding: 15px 50px;
            font-size: 1.2rem;
            font-family: inherit;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.15em;
            margin: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #5a8a9e 0%, #3a6a7e 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(90, 138, 158, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(90, 138, 158, 0.6);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: transparent;
            color: #2c5a6e;
            border: 2px solid #5a8a9e;
        }

        .btn-secondary:hover {
            border-color: #3a6a7e;
            color: #3a6a7e;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 提示文字 */
        .hint {
            text-align: center;
            color: #2c5a6e;
            font-size: 1rem;
            margin: 20px 0;
            line-height: 1.8;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .temple-name { font-size: 1.8rem; }
            .mizu-paper { height: 250px; }
            .fortune-type { font-size: 2rem; }
            .btn { padding: 12px 30px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <!-- 水面效果 -->
    <div class="water-surface"></div>
    
    <!-- 涟漪容器 -->
    <div class="ripple-container" id="rippleContainer"></div>

    <div class="container">
        <header>
            <h1 class="temple-name">贵船神社</h1>
            <p class="subtitle">水占卜 · 水みくじ</p>
        </header>

        <!-- 水签纸 -->
        <div class="mizu-paper blank" id="mizuPaper">
            <div class="paper-content" id="paperContent">
                <div class="fortune-type" id="fortuneType"></div>
                <div class="poem" id="poemText"></div>
                <div class="details" id="fortuneDetails"></div>
            </div>
        </div>

        <!-- 提示 -->
        <p class="hint" id="hint">
            静心凝神，默念所求之事<br>
            点击"占卜"将签纸放入水中
        </p>

        <!-- 控制按钮 -->
        <div class="controls">
            <button class="btn btn-primary" id="divineBtn" onclick="startDivination()">占卜</button>
            <button class="btn btn-secondary" onclick="reset()">重置</button>
        </div>
    </div>

    <script>
        // 贵船神社水占卜数据（30 签）
        const omikujiData = [
            { type: '大吉', poem: '云散月明朗\n风静波浪平\n前路无障碍\n万事皆亨通', details: {
                '愿望': '会实现', '待人': '会来', '失物': '会出现', '旅行': '好', 
                '生意': '兴隆', '健康': '良好', '考试': '合格', '缘谈': '好'
            }},
            { type: '大吉', poem: '春风吹万物\n大地回春时\n努力终有报\n喜悦满心怀', details: {
                '愿望': '会实现', '待人': '会来', '失物': '能找到', '旅行': '好',
                '生意': '好', '健康': '良好', '考试': '合格', '缘谈': '好'
            }},
            { type: '吉', poem: '花开逢雨露\n叶茂得阳光\n努力加勤奋\n成功在眼前', details: {
                '愿望': '会实现', '待人': '会来', '失物': '会出现', '旅行': '好',
                '生意': '好', '健康': '良好', '考试': '合格', '缘谈': '好'
            }},
            { type: '吉', poem: '山重水复路\n柳暗花明村\n坚持不放弃\n终见好前程', details: {
                '愿望': '会实现', '待人': '晚来', '失物': '会出现', '旅行': '好',
                '生意': '好', '健康': '良好', '考试': '合格', '缘谈': '好'
            }},
            { type: '中吉', poem: '云遮月不明\n风吹花未开\n耐心等待时\n终有好结果', details: {
                '愿望': '会实现', '待人': '会来', '失物': '会出现', '旅行': '好',
                '生意': '普通', '健康': '良好', '考试': '合格', '缘谈': '好'
            }},
            { type: '中吉', poem: '山高路遥远\n水深舟可行\n努力向前进\n终会达目的', details: {
                '愿望': '会实现', '待人': '会来', '失物': '难出现', '旅行': '好',
                '生意': '普通', '健康': '良好', '考试': '合格', '缘谈': '好'
            }},
            { type: '小吉', poem: '小雨润大地\n微风拂面来\n平平淡淡过\n安稳即是福', details: {
                '愿望': '会实现', '待人': '会来', '失物': '会出现', '旅行': '普通',
                '生意': '普通', '健康': '良好', '考试': '合格', '缘谈': '普通'
            }},
            { type: '小吉', poem: '日出东方红\n月落西山暗\n顺其自然过\n平安即是福', details: {
                '愿望': '会实现', '待人': '会来', '失物': '会出现', '旅行': '普通',
                '生意': '普通', '健康': '良好', '考试': '合格', '缘谈': '普通'
            }},
            { type: '末吉', poem: '冬去春将来\n寒尽暖自开\n耐心等待时\n好运终来临', details: {
                '愿望': '会实现', '待人': '会来', '失物': '晚出现', '旅行': '普通',
                '生意': '谨慎', '健康': '注意', '考试': '努力', '缘谈': '等待'
            }},
            { type: '末吉', poem: '乌云遮日月\n风雨阻前程\n坚持不放弃\n终见天晴时', details: {
                '愿望': '会实现', '待人': '会来', '失物': '难出现', '旅行': '注意',
                '生意': '谨慎', '健康': '注意', '考试': '努力', '缘谈': '等待'
            }},
            { type: '凶', poem: '水流花谢去\n云散月无光\n谨慎待时运\n静候佳音来', details: {
                '愿望': '难实现', '待人': '不会来', '失物': '难出现', '旅行': '不好',
                '生意': '不好', '健康': '不好', '考试': '不好', '缘谈': '不好'
            }}
        ];

        let isDivining = false;
        let hasDivined = false;

        // 创建涟漪
        function createRipple() {
            const container = document.getElementById('rippleContainer');
            const ripple = document.createElement('div');
            ripple.className = 'ripple animate';
            container.appendChild(ripple);
            
            setTimeout(() => {
                ripple.remove();
            }, 2000);
        }

        // 开始占卜
        function startDivination() {
            if (isDivining || hasDivined) return;
            
            isDivining = true;
            
            const paper = document.getElementById('mizuPaper');
            const hint = document.getElementById('hint');
            const btn = document.getElementById('divineBtn');
            
            btn.disabled = true;
            hint.innerHTML = '将签纸放入水中...<br>等待文字浮现';
            
            // 开始涟漪动画
            const rippleInterval = setInterval(createRipple, 500);
            
            setTimeout(() => {
                // 随机选择签
                const randomIndex = Math.floor(Math.random() * omikujiData.length);
                const selected = omikujiData[randomIndex];
                
                // 设置内容
                document.getElementById('fortuneType').textContent = selected.type;
                document.getElementById('fortuneType').className = 'fortune-type ' + selected.type;
                document.getElementById('poemText').textContent = selected.poem;
                
                // 设置运势详情
                const detailsHtml = Object.entries(selected.details).map(([key, value]) => `
                    <div class="detail-item">
                        <span class="detail-label">${key}</span>
                        <span class="detail-value">${value}</span>
                    </div>
                `).join('');
                document.getElementById('fortuneDetails').innerHTML = detailsHtml;
                
                // 显示内容
                paper.classList.remove('blank');
                paper.classList.add('revealed', 'floating');
                
                hint.innerHTML = '文字已浮现';
                
                clearInterval(rippleInterval);
                isDivining = false;
                hasDivined = true;
                
                btn.textContent = '再占一次';
                btn.disabled = false;
                btn.onclick = reset;
            }, 2000);
        }

        // 重置
        function reset() {
            hasDivined = false;
            isDivining = false;
            
            const paper = document.getElementById('mizuPaper');
            paper.classList.remove('revealed', 'floating');
            paper.classList.add('blank');
            
            document.getElementById('hint').innerHTML = '静心凝神，默念所求之事<br>点击"占卜"将签纸放入水中';
            
            const btn = document.getElementById('divineBtn');
            btn.textContent = '占卜';
            btn.onclick = startDivination;
        }

        // 点击签纸也可以占卜
        document.getElementById('mizuPaper').addEventListener('click', startDivination);
    </script>
</body>
</html>
