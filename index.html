        * {

            padding: 0;
            box-sizing: border-box;

            min-height: 100vh;
            color: #1a3a4a;
            overflow-x: hidden;
            position: relative;
        }

        /* 水面效果 */
        .water-surface {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(180deg, rgba(127, 179, 201, 0.3) 0%, rgba(90, 138, 158, 0.6) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* 涟漪容器 */
        .ripple-container {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            pointer-events: none;
            z-index: 2;
        }

        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            opacity: 0;
        }

        .ripple.animate {
            animation: rippleEffect 2s ease-out infinite;
        }

        @keyframes rippleEffect {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
            }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 3;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 标题 */
        header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 20px;
        }

        .temple-name {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a3a4a;
            margin-bottom: 10px;
            letter-spacing: 0.2em;
        }

        .subtitle {
            font-size: 1rem;
            color: #2c5a6e;
            letter-spacing: 0.15em;
        }

        /* 水签纸 */
        .mizu-mikuji-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 30px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mizu-paper {
            width: 350px;
            height: 200px;
            background: linear-gradient(135deg, #fffef9 0%, #f5f0e8 100%);
            border: 2px solid #c9d4d9;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.5s ease;
            overflow: hidden;
        }

        .mizu-paper.floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-10px) rotate(1deg);
            }
        }

        .mizu-paper.blank::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.8) 0%, rgba(245,240,232,0.9) 100%);
            z-index: 10;
            transition: opacity 1s ease;
        }

        .mizu-paper.revealed::after {
            opacity: 0;
            pointer-events: none;
        }

        .paper-content {
            text-align: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .mizu-paper.revealed .paper-content {
            opacity: 1;
        }

        .fortune-type {
            font-size: 2rem;
            font-weight: 700;
            color: #c41e3a;
            margin-bottom: 15px;
        }

        .fortune-type.吉 { color: #228b22; }
        .fortune-type.中吉 { color: #4169e1; }
        .fortune-type.小吉 { color: #9370db; }
        .fortune-type.末吉 { color: #da70d6; }
        .fortune-type.凶 { color: #696969; }

        .poem {
            font-size: 0.95rem;
            line-height: 1.8;
            color: #1a3a4a;
            margin: 15px 0;
            font-style: italic;
        }

        .stick-number {
            font-size: 0.85rem;
            color: #5a7a8a;
            margin-bottom: 10px;
        }

        /* 按钮 */
        .btn {
            padding: 15px 50px;
            font-size: 1.1rem;
            font-family: inherit;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.15em;
            margin: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #5a8a9e 0%, #3a6a7e 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(90, 138, 158, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(90, 138, 158, 0.6);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: transparent;
            color: #2c5a6e;
            border: 2px solid #5a8a9e;
        }

        .btn-secondary:hover {
            border-color: #3a6a7e;
            color: #3a6a7e;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 运势详情 */
        .fortune-details {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.9);

            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: none;
        }

        .fortune-details.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            padding: 10px;
            background: rgba(90, 138, 158, 0.1);
            border-radius: 8px;
        }

        .detail-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #5a8a9e;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 0.95rem;
            color: #1a3a4a;
        }

        /* 提示 */
        .hint {
            text-align: center;
            color: #2c5a6e;
            font-size: 1rem;
            margin: 20px 0;
            line-height: 1.8;
        }

        /* 水滴装饰 */
        .water-drop {
            position: fixed;
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;

            0% {

            100% {

            .fortune-type { font-size: 1.6rem; }
            .detail-grid { grid-template-columns: 1fr; }

                '愿望': '会实现', '待人': '会来', '失物': '会出现', '旅行': '普通', '生意': '谨慎', '健康': '注意', '考试': '努力', '缘谈': '等待', '搬家': '等待', '生产': '注意'
            }},
            { num: 30, type: '凶', poem: '水流花谢去，云散月无光\n谨慎待时运，静候佳音来', details: {
                '愿望': '难实现', '待人': '不会来', '失物': '难出现', '旅行': '不好', '生意': '不好', '健康': '不好', '考试': '不好', '缘谈': '不好', '搬家': '不好', '生产': '注意'
            }}
        ];

        let isDivining = false;
        let hasDivined = false;

        // 创建水滴
        function createWaterDrops() {
            const container = document.getElementById('waterDrops');
            for (let i = 0; i < 10; i++) {
                const drop = document.createElement('div');
                drop.className = 'water-drop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (Math.random() * 2 + 2) + 's';
                drop.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(drop);
            }
        }

        // 创建涟漪
        function createRipple() {
            const container = document.getElementById('rippleContainer');
            const ripple = document.createElement('div');
            ripple.className = 'ripple animate';
            container.appendChild(ripple);
            
            setTimeout(() => {
                ripple.remove();
            }, 2000);
        }

        // 开始占卜
        function startDivination() {
            if (isDivining || hasDivined) return;
            
            isDivining = true;
            const paper = document.getElementById('mizuPaper');
            const hint = document.getElementById('mainHint');
            const btn = document.getElementById('divineBtn');
            
            btn.disabled = true;
            hint.innerHTML = '将签纸放入水中...<br>等待文字浮现';
            
            // 开始涟漪动画
            const rippleInterval = setInterval(createRipple, 500);
            
            setTimeout(() => {
                // 随机选择签
                const randomIndex = Math.floor(Math.random() * mikujiData.length);
                const selected = mikujiData[randomIndex];
                
                // 设置内容
                document.getElementById('stickNumber').textContent = `第${selected.num}番`;
                document.getElementById('fortuneType').textContent = selected.type;
                document.getElementById('fortuneType').className = 'fortune-type ' + selected.type;
                document.getElementById('poemText').textContent = selected.poem;
                
                // 显示内容
                paper.classList.remove('blank');
                paper.classList.add('revealed', 'floating');
                
                hint.innerHTML = '文字已浮现<br>查看下方详细运势';
                
                // 显示详情
                showDetails(selected.details);
                
                clearInterval(rippleInterval);
                isDivining = false;
                hasDivined = true;
                
                btn.textContent = '再占一次';
                btn.disabled = false;
                btn.onclick = reset;
            }, 2000);
        }

        // 显示详情
        function showDetails(details) {
            const container = document.getElementById('fortuneDetails');
            const html = `
                <div class="detail-grid">
                    ${Object.entries(details).map(([key, value]) => `
                        <div class="detail-item">
                            <div class="detail-label">${key}</div>
                            <div class="detail-value">${value}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            container.innerHTML = html;
            container.classList.add('show');
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 重置
        function reset() {
            hasDivined = false;
            isDivining = false;
            
            const paper = document.getElementById('mizuPaper');
            paper.classList.remove('revealed', 'floating');
            paper.classList.add('blank');
            
            document.getElementById('fortuneDetails').classList.remove('show');
            document.getElementById('mainHint').innerHTML = '静心凝神，默念所求之事<br>点击"占卜"将签纸放入水中';
            
            const btn = document.getElementById('divineBtn');
            btn.textContent = '占卜';
            btn.onclick = startDivination;
        }

        // 初始化
        createWaterDrops();
    </script>
</body>
</html>
