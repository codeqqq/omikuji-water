<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貴船神社 水占みくじ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif JP', serif;
            background: linear-gradient(180deg, #87CEEB 0%, #5F9EA0 50%, #4682B4 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        .water-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(180deg, rgba(95, 158, 160, 0.4) 0%, rgba(70, 130, 180, 0.7) 100%);
            pointer-events: none;
            z-index: 1;
        }
        .container {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header { text-align: center; padding: 30px 0 20px; }
        .temple-name { font-size: 2rem; font-weight: 700; color: #1a3a4a; margin-bottom: 10px; }
        .subtitle { font-size: 1rem; color: #2c5a6e; }
        
        /* 水签纸 - 按照真实照片格式 */
        .mikuji-paper {
            width: 100%;
            max-width: 650px;
            background: linear-gradient(135deg, #fffef9 0%, #f5f0e8 100%);
            border: 2px solid #8b7355;
            border-radius: 8px;
            padding: 20px;
            margin: 30px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            opacity: 0;
            transition: opacity 2s ease;
        }
        .mikuji-paper.visible { opacity: 1; }
        
        .mikuji-header {
            text-align: center;
            border-bottom: 2px solid #8b7355;
            padding-bottom: 12px;
            margin-bottom: 15px;
        }
        .mikuji-title { 
            font-size: 1.8rem; 
            font-weight: 700; 
            color: #1a3a4a;
            letter-spacing: 0.2em;
        }
        .fortune-num {
            font-size: 1.1rem;
            color: #8b7355;
            margin: 8px 0;
        }
        .fortune-type {
            font-size: 2.2rem;
            font-weight: 700;
            color: #c41e3a;
            margin: 10px 0;
        }
        .fortune-type.吉 { color: #228b22; }
        .fortune-type.中吉 { color: #4169e1; }
        .fortune-type.小吉 { color: #9370db; }
        .fortune-type.末吉 { color: #da70d6; }
        .fortune-type.凶 { color: #696969; }
        
        .fortune-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        .fortune-table td {
            border: 1px solid #8b7355;
            padding: 8px 5px;
            font-size: 0.9rem;
        }
        .fortune-label {
            background: rgba(139, 115, 85, 0.1);
            font-weight: 600;
            color: #8b7355;
            width: 25%;
            text-align: center;
        }
        .fortune-value {
            color: #1a3a4a;
            padding-left: 10px;
        }
        
        .poem-section {
            background: rgba(139, 115, 85, 0.08);
            border: 1px solid #8b7355;
            border-radius: 6px;
            padding: 12px;
            margin: 15px 0;
            text-align: center;
        }
        .poem-label {
            font-size: 0.85rem;
            color: #8b7355;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .poem-text { 
            font-size: 1rem; 
            line-height: 1.8; 
            color: #1a3a4a;
            white-space: pre-line;
        }
        
        .btn {
            padding: 15px 50px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            margin: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #5a8a9e, #3a6a7e);
            color: #fff;
        }
        .btn-secondary {
            background: transparent;
            color: #2c5a6e;
            border: 2px solid #5a8a9e;
        }
        .controls { display: flex; gap: 15px; margin: 20px 0; }
        .hint { text-align: center; color: #2c5a6e; margin: 20px 0; line-height: 1.8; }
        
        /* 涟漪动画 */
        .ripple-container {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            pointer-events: none;
            z-index: 1;
        }
        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            opacity: 0;
        }
        .ripple.animate {
            animation: rippleEffect 2s ease-out infinite;
        }
        @keyframes rippleEffect {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 300px; height: 300px; opacity: 0; }
        }
        
        @media (max-width: 768px) {
            .fortune-table td { font-size: 0.8rem; padding: 5px 3px; }
            .mikuji-title { font-size: 1.5rem; }
            .fortune-type { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="water-bg"></div>
    <div class="ripple-container" id="rippleContainer"></div>

    <div class="container">
        <header>
            <h1 class="temple-name">貴布禰総本宮 貴船神社</h1>
            <p class="subtitle">水占みくじ</p>
        </header>

        <div class="mikuji-paper" id="mikujiPaper">
            <div class="mikuji-header">
                <div class="mikuji-title">水占みくじ</div>
                <div class="fortune-num" id="fortuneNum">第 7 番</div>
                <div class="fortune-type" id="fortuneType">大吉</div>
            </div>

            <table class="fortune-table">
                <tr><td class="fortune-label">願望</td><td class="fortune-value" id="v1">叶う</td></tr>
                <tr><td class="fortune-label">待人</td><td class="fortune-value" id="v2">来る</td></tr>
                <tr><td class="fortune-label">失物</td><td class="fortune-value" id="v3">出る</td></tr>
                <tr><td class="fortune-label">旅行</td><td class="fortune-value" id="v4">良し</td></tr>
                <tr><td class="fortune-label">商売</td><td class="fortune-value" id="v5">良し</td></tr>
                <tr><td class="fortune-label">学問</td><td class="fortune-value" id="v6">良し</td></tr>
                <tr><td class="fortune-label">争事</td><td class="fortune-value" id="v7">良し</td></tr>
                <tr><td class="fortune-label">恋愛</td><td class="fortune-value" id="v8">良し</td></tr>
                <tr><td class="fortune-label">病気</td><td class="fortune-value" id="v9">良し</td></tr>
                <tr><td class="fortune-label">出産</td><td class="fortune-value" id="v10">良し</td></tr>
                <tr><td class="fortune-label">方向</td><td class="fortune-value" id="v11">良し</td></tr>
                <tr><td class="fortune-label">転居</td><td class="fortune-value" id="v12">良し</td></tr>
            </table>

            <div class="poem-section">
                <div class="poem-label">歌</div>
                <div class="poem-text" id="poemText"></div>
            </div>
        </div>

        <p class="hint" id="hint">
            心を静かにして、お祈りしたいことをお思いください<br>
            「占い」ボタンを押して、神籤を水に浮かべてください
        </p>

        <div class="controls">
            <button class="btn btn-primary" id="divineBtn" onclick="divine()">占い</button>
            <button class="btn btn-secondary" onclick="reset()">リセット</button>
        </div>
    </div>

    <script>
        const mikujiData = [
            { num: 1, type: '大吉', poem: '雲散じて月明らかなり\n風静かにして浪平らかなり', values: ['叶う', '来る', '出る', '良し', '良し', '良し', '良し', '良し', '良し', '良し', '良し', '良し'] },
            { num: 2, type: '大吉', poem: '久方の天の戸開き\n神風や吹きて霧散る', values: ['叶う', '来る', '出る', '良し', '良し', '良し', '良し', '良し', '良し', '良し', '良し', '良し'] },
            { num: 3, type: '吉', poem: '春風や吹きて花開く\n大地に恵みの雨降る', values: ['叶う', '来る', '出る', '良し', '良し', '良し', '良し', '良し', '良し', '良し', '良し', '良し'] },
            { num: 4, type: '吉', poem: '山重なり水復れど\n柳暗く花明らかなる', values: ['叶う', '遅し', '出る', '良し', '良し', '良し', '良し', '良し', '良し', '良し', '良し', '良し'] },
            { num: 5, type: '吉', poem: '風吹いて雲散じゆけば\n月出て山河を照らす', values: ['叶う', '来る', '出る', '良し', '良し', '良し', '良し', '良し', '良し', '良し', '良し', '良し'] },
            { num: 6, type: '中吉', poem: '雲月を遮れど\n時は来たりて光射す', values: ['叶う', '来る', '出ず', '良し', '並み', '良し', '良し', '良し', '良し', '良し', '良し', '良し'] },
            { num: 7, type: '大吉', poem: '万事望のまゝなり\n思はず早くとのう\n安心せよ', values: ['叶う', '安心せよ', '出づる', '行先利徳あり', '損はなし', '安心して勉強せよ', '良し', '安心せよ', '治療に専念せよ', 'やすし', '南の方 よろし', '急がぬが 吉'] },
            { num: 8, type: '中吉', poem: '山高く路遠けれど\n水深く舟行るべし', values: ['叶う', '来る', '出ず', '良し', '並み', '良し', '良し', '良し', '良し', '良し', '良し', '良し'] },
            { num: 9, type: '小吉', poem: '小雨大地を潤し\n微風面を撫ず', values: ['叶う', '来る', '出る', '並み', '並み', '良し', '良し', '並み', '良し', '良し', '並み', '並み'] },
            { num: 10, type: '小吉', poem: '日出でて東方紅く\n月落ちて西山暗し', values: ['叶う', '来る', '出る', '並み', '並み', '良し', '良し', '並み', '良し', '良し', '並み', '並み'] },
            { num: 11, type: '末吉', poem: '冬去りて春来たらんとす\n寒尽きて暖自ら開く', values: ['叶う', '待つべし', '遅し', '並み', '慎め', '努力せよ', '慎め', '待つべし', '注意せよ', '注意せよ', '並み', '待つべし'] },
            { num: 12, type: '末吉', poem: '烏雲日月を遮り\n風雨前程を阻む', values: ['叶う', '待つべし', '出ず', '注意せよ', '慎め', '努力せよ', '慎め', '待つべし', '注意せよ', '注意せよ', '注意せよ', '待つべし'] },
            { num: 13, type: '凶', poem: '雲月を遮り\n風雨前程を阻む', values: ['叶いがたし', '来ず', '出ず', '悪し', '悪し', '悪し', '悪し', '悪し', '悪し', '注意せよ', '悪し', '悪し'] },
            { num: 14, type: '凶', poem: '山高く路険しく\n水深く波多し', values: ['叶いがたし', '来ず', '出ず', '悪し', '悪し', '悪し', '悪し', '悪し', '悪し', '注意せよ', '悪し', '悪し'] }
        ];

        let isDivining = false;
        let hasDivined = false;

        function createRipple() {
            const container = document.getElementById('rippleContainer');
            const ripple = document.createElement('div');
            ripple.className = 'ripple animate';
            container.appendChild(ripple);
            setTimeout(() => ripple.remove(), 2000);
        }

        function divine() {
            if (isDivining || hasDivined) return;
            isDivining = true;
            
            const btn = document.getElementById('divineBtn');
            const hint = document.getElementById('hint');
            const paper = document.getElementById('mikujiPaper');
            
            btn.disabled = true;
            hint.innerHTML = '神籤を水に浮かべています...<br>文字が浮かび上がるのをお待ちください';
            
            const rippleInterval = setInterval(createRipple, 500);
            
            setTimeout(() => {
                const selected = mikujiData[Math.floor(Math.random() * mikujiData.length)];
                
                document.getElementById('fortuneNum').textContent = `第${selected.num}番`;
                document.getElementById('fortuneType').textContent = selected.type;
                document.getElementById('fortuneType').className = `fortune-type ${selected.type}`;
                document.getElementById('poemText').textContent = selected.poem;
                
                selected.values.forEach((v, i) => {
                    document.getElementById(`v${i+1}`).textContent = v;
                });
                
                paper.classList.add('visible');
                hint.innerHTML = '文字が浮かび上がりました';
                
                clearInterval(rippleInterval);
                btn.textContent = 'もう一度';
                btn.disabled = false;
                btn.onclick = reset;
                
                isDivining = false;
                hasDivined = true;
            }, 2000);
        }

        function reset() {
            hasDivined = false;
            isDivining = false;
            
            document.getElementById('mikujiPaper').classList.remove('visible');
            document.getElementById('hint').innerHTML = '心を静かにして、お祈りしたいことをお思いください<br>「占い」ボタンを押して、神籤を水に浮かべてください';
            
            const btn = document.getElementById('divineBtn');
            btn.textContent = '占い';
            btn.onclick = divine;
        }
    </script>
</body>
</html>
